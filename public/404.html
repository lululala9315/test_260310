<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA 라우팅 — 404를 index.html로 리다이렉트
    const path = window.location.pathname;
    const base = '/test_260310';
    const route = path.replace(base, '') || '/';
    sessionStorage.setItem('spa-redirect', route);
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
